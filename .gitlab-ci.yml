stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

build-api:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE/hiking-backend:$IMAGE_TAG $CI_PROJECT_DIR
    - docker push $CI_REGISTRY_IMAGE/hiking-backend:$IMAGE_TAG
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy:
  stage: deploy
  tags:
    - production
  script:
    - cd /opt/WebSite
    - export IMAGE_TAG=$IMAGE_TAG
    - docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD
    - docker compose pull
    - docker compose up -d --remove-orphans
  rules:
    - if: $CI_COMMIT_BRANCH == "main"